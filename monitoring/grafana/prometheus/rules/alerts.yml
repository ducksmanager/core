groups:
  - name: availability
    rules:
      # No host metrics received from the app-server agent for >2m: either the
      # server, Docker, or the Alloy agent is down. Detected purely from the
      # monitoring server, so it fires even during a full app-server outage.
      - alert: AppServerDown
        expr: absent(node_memory_MemTotal_bytes)
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "App server not reporting metrics"
          description: "No host metrics received from the app-server Alloy agent for over 2 minutes."

      - alert: HealthcheckFailing
        expr: probe_success == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Healthcheck failing for {{ $labels.instance }}"
          description: "External probe to {{ $labels.instance }} has been failing for over 1 minute."

  - name: resources
    rules:
      - alert: DiskAlmostFull
        expr: |
          100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
                    / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk almost full on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} is over 90% full."

      - alert: HighMemory
        expr: |
          100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on app server"
          description: "Memory usage has been above 90% for over 10 minutes."

      - alert: ContainerRestarting
        expr: changes(container_start_time_seconds{name!=""}[15m]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} is restarting"
          description: "Container {{ $labels.name }} restarted more than twice in 15 minutes."
