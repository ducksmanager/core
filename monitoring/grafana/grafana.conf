# DucksManager monitoring — Caddy site config, mounted into the EXISTING
# host-level Caddy at /etc/caddy/sites-enabled/grafana.conf (this stack does not
# run its own Caddy). The stack publishes grafana/prometheus/loki on 127.0.0.1
# (see docker-compose.yml), so the host Caddy reverse_proxies to those loopback
# ports. The ingest site also needs INGEST_BASICAUTH_HASH in this Caddy's env.

grafana.ducksmanager.net {
	reverse_proxy localhost:3000
}

# Ingest endpoint the app-server Alloy agent pushes to (metrics + logs).
ingest.ducksmanager.net {
	basicauth {
		ingest {env.INGEST_BASICAUTH_HASH}
	}

	handle /api/v1/write* {
		reverse_proxy localhost:9090
	}

	handle /loki/api/v1/push* {
		reverse_proxy localhost:3100
	}

	handle {
		respond "Not found" 404
	}
}
