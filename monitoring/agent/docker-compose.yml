services:
  alloy:
    container_name: monitoring-alloy
    image: grafana/alloy:latest
    restart: always
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    env_file:
      - .env
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # CPU / memory / load come from /proc and /sys only. The host root is
      # deliberately NOT mounted, so the agent can't read host secrets (SSH keys,
      # other apps' .env, etc.). Disk usage arrives as a textfile metric written
      # by the disk-metrics sidecar below.
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /data/metrics:/textfile:ro
      - alloy_data:/var/lib/alloy/data
    networks:
      - public-network # reach the Caddy admin metrics endpoint (caddy:2019)
      - dm-api-network # reach pastec, if a custom exporter is added later

  # Reports free/total space for the /data volume without exposing the host root.
  # It only mounts /data/metrics (which lives on /data), so `df` there measures
  # the /data filesystem; output is picked up by the agent's textfile collector.
  disk-metrics:
    container_name: monitoring-disk-metrics
    image: busybox:latest
    restart: always
    command: ["sh", "/disk-metrics.sh"]
    volumes:
      - ./disk-metrics.sh:/disk-metrics.sh:ro
      - /data/metrics:/out

volumes:
  alloy_data:

networks:
  public-network:
    external: true
  dm-api-network:
    external: true
