name: dumili-api
services:
  kumiko:
    container_name: kumiko
    image: ghcr.io/bperel/kumiko
    restart: always
    networks:
      - dumili-network

  paddleocr:
    container_name: paddleocr
    image: ghcr.io/bperel/paddleocr
    restart: always
    shm_size: "2gb"
    environment:
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
    volumes:
      - /root/.paddlex
    networks:
      - dumili-network

  dumili-api:
    container_name: dumili-api
    image: ghcr.io/bperel/dumili-api
    restart: always
    environment:
      REDIS_URL: redis://redis:6379
    networks:
      - public-network
      - dumili-network
      - dm-api-network

  dumili-worker:
    container_name: dumili-worker
    image: ghcr.io/bperel/dumili-worker
    restart: always
    environment:
      REDIS_URL: redis://redis:6379
    networks:
      - dumili-network
      - dm-api-network

  redis:
    container_name: dumili-redis
    image: redis:7-alpine
    restart: always
    networks:
      - dumili-network
  db:
    container_name: dumili-db
    restart: always
    image: mariadb:12.2
    ports:
      - "127.0.0.1:64097:3306"
    volumes:
      - /var/lib/mysql
    networks:
      - dumili-network
    environment:
      MYSQL_DATABASE: dumili
      MARIADB_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD

networks:
  dumili-network:
  dm-api-network:
    external: true
  public-network:
    external: true
